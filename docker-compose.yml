services:
  mongo:
    image: mongo:7
    container_name: gaya_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: gaya_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles:
      - legacy-api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gaya_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    profiles:
      - legacy-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gaya_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env.local
    environment:
      - MONGODB_URI=mongodb://mongo:27017/gaya-connect
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    depends_on:
      - mongo

volumes:
  mongo_data:
